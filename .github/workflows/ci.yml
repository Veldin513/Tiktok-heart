name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Security scan
        run: python scripts/security_scan.py --tracked-only

      - name: Python tests
        run: python -m pytest

      - name: Critical lint
        run: python -m ruff check yara_app app_shell scripts tests --select F401,F841,F821 --exclude __pycache__

      - name: JavaScript syntax
        run: node --check app_shell/web/app.js
